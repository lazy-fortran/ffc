name = "ffc"
version = "0.1.0"
description = "Lazy Fortran compiler using FortFront and LIRIC"
author = "krystophny"
license = "MIT"

[dependencies]
fortfront = { path = "../fortfront" }

[build]
auto-examples = false
link = ["liric", "stdc++", "m", "dl", "pthread"]

[fortran]
implicit-external = false
implicit-typing = false
source-form = "free"
