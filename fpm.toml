name = "ffc"
version = "0.1.0"
description = "Lazy Fortran compiler using FortFront and LIRIC"
author = "krystophny"
license = "MIT"

[dependencies]
stdlib = "*"
fortfront = { path = "../fortfront" }

[build]
auto-executables = false
auto-tests = false
auto-examples = false
link = ["liric", "stdc++", "m", "dl", "pthread"]

[fortran]
implicit-external = false
implicit-typing = false
source-form = "free"

[library]
source-dir = "src_mvp"

[[executable]]
name = "ffc"
source-dir = "app"
main = "ffc.f90"

[[test]]
name = "test_liric_session_bindings"
source-dir = "test_mvp"
main = "test_liric_session_bindings.f90"

