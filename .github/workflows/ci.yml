name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: build + fpm test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ffc
        uses: actions/checkout@v4
        with:
          path: ffc

      - name: Checkout fortfront (sibling path)
        uses: actions/checkout@v4
        with:
          repository: lazy-fortran/fortfront
          path: fortfront

      - name: Checkout liric
        uses: actions/checkout@v4
        with:
          repository: krystophny/liric
          path: liric

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gfortran-14 gcc-14 g++-14 cmake ninja-build curl
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-14 100
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-14 100
          sudo update-alternatives --install /usr/bin/gfortran gfortran /usr/bin/gfortran-14 100
          gcc --version | head -1
          gfortran --version | head -1

      - name: Install fpm
        run: |
          sudo curl -L -o /usr/local/bin/fpm \
            https://github.com/fortran-lang/fpm/releases/download/v0.13.0/fpm-0.13.0-linux-x86_64-gcc-12
          sudo chmod +x /usr/local/bin/fpm
          fpm --version

      - name: Build liric
        working-directory: liric
        env:
          CC: gcc-14
          CXX: g++-14
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j"$(nproc)"
          ls -la build/libliric.a

      - name: Build ffc
        working-directory: ffc
        env:
          LIBRARY_PATH: ${{ github.workspace }}/liric/build
        run: fpm build

      - name: Run ffc tests
        working-directory: ffc
        env:
          LIBRARY_PATH: ${{ github.workspace }}/liric/build
        run: fpm test
